<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Adivina el Número!</title>
    <style>
        /* Fondo espacial animado */
        body {
            background: linear-gradient(135deg, #0f0c1b 0%, #201335 50%, #0b162c 100%);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            height: 100vh;
            justify-content: center;
            align-items: center;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        /* Efecto de estrellas de fondo */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background-image:
                radial-gradient(white, rgba(255, 255, 255, .2) 2px, transparent 40px),
                radial-gradient(white, rgba(255, 255, 255, .15) 1px, transparent 30px);
            background-size: 550px 550px, 350px 350px;
            background-position: 0 0, 40px 60px;
            opacity: 0.4;
            z-index: 0;
        }

        /* Tarjeta de Cristal (Glassmorphism) */
        .card {
            background: rgba(25, 18, 46, 0.45);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 35px 40px;
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37),
                0 0 20px rgba(138, 43, 226, 0.2);
            text-align: center;
            width: 340px;
            z-index: 1;
            box-sizing: border-box;
        }

        h2 {
            color: #ffffff;
            font-size: 28px;
            letter-spacing: 1px;
            margin-top: 0;
            margin-bottom: 10px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.6);
        }

        p {
            color: #b0a6ce;
            font-size: 15px;
            margin-bottom: 25px;
        }

        /* Input con estilo de neón */
        input {
            padding: 12px;
            width: 100%;
            background: rgba(255, 255, 255, 0.07);
            border: 2px solid rgba(0, 229, 255, 0.3);
            border-radius: 12px;
            color: #ffffff;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            outline: none;
            box-sizing: border-box;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        input:focus {
            border-color: #00e5ff;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.5);
            background: rgba(255, 255, 255, 0.12);
        }

        /* Botón Probar (Cian/Azul Eléctrico) */
        button,
        .btn-link {
            padding: 14px;
            width: 100%;
            background: linear-gradient(90deg, #007bff, #00e5ff);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: inline-block;
            box-sizing: border-box;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 229, 255, 0.3);
        }

        button:hover,
        .btn-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 229, 255, 0.6);
            filter: brightness(1.1);
        }

        button:active,
        .btn-link:active {
            transform: translateY(1px);
        }

        /* Botón Reiniciar (Verde Esmeralda/Neón) */
        .btn-restart {
            background: linear-gradient(90deg, #11998e, #38ef7d);
            box-shadow: 0 4px 15px rgba(56, 239, 125, 0.3);
        }

        .btn-restart:hover {
            box-shadow: 0 6px 20px rgba(56, 239, 125, 0.6);
        }

        /* Contenedores de Mensajes de Feedback */
        .msg {
            margin-top: 20px;
            padding: 12px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% {
                transform: scale(0.8);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .error {
            background-color: rgba(220, 53, 69, 0.2);
            color: #ff6b81;
            border: 1px solid rgba(220, 53, 69, 0.4);
            box-shadow: 0 0 15px rgba(220, 53, 69, 0.15);
        }

        .success {
            background-color: rgba(40, 167, 69, 0.2);
            color: #2ed573;
            border: 1px solid rgba(40, 167, 69, 0.4);
            box-shadow: 0 0 20px rgba(40, 167, 69, 0.3);
        }

        .intentos-text {
            color: #a094b7;
            font-size: 13px;
            margin-top: 10px;
        }

        .intentos-text strong {
            color: #00e5ff;
        }
    </style>
</head>

<body>

    <div class="card">
        <h2>¿Adivinas?</h2>
        <p>Piensa un número entre 1 y 100</p>

        {% if gano %}
        <div class="msg success">
            {{ mensaje }}
        </div>
        {% if intentos %}
        <p class="intentos-text">Lo lograste en <strong>{{ intentos }}</strong> intentos.</p>
        {% endif %}
        <a href="/reiniciar" class="btn-link btn-restart">Reiniciar juego</a>
        {% else %}
        <form method="POST">
            <input type="number" name="intento" min="1" max="100" placeholder="Ej: 42" required autofocus>
            <button type="submit">Probar</button>
        </form>

        {% if mensaje %}
        <div class="msg error">
            {{ mensaje }}
        </div>
        {% if intentos %}
        <p class="intentos-text">Llevas <strong>{{ intentos }}</strong> intentos.</p>
        {% endif %}
        {% endif %}
        {% endif %}
    </div>

</body>

</html>
